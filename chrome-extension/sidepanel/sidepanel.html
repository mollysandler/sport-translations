<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sports Translator</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="panel">
    <header class="header">
      <h1>Sports Translator</h1>
      <span class="status-badge" id="statusBadge">Idle</span>
    </header>

    <div class="controls">
      <div class="lang-row">
        <label>
          Source
          <select id="sourceLang">
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="hi">Hindi</option>
            <option value="ru">Russian</option>
          </select>
        </label>
        <label>
          Target
          <select id="targetLang">
            <option value="hi">Hindi</option>
            <option value="en">English</option>
            <option value="es">Spanish</option>
            <option value="fr">French</option>
            <option value="de">German</option>
            <option value="it">Italian</option>
            <option value="pt">Portuguese</option>
            <option value="ar">Arabic</option>
            <option value="ja">Japanese</option>
            <option value="ko">Korean</option>
            <option value="zh">Chinese</option>
            <option value="ru">Russian</option>
          </select>
        </label>
      </div>
      <button id="startStopBtn" class="btn btn-start">Start Translating</button>
    </div>

    <div class="warning hidden" id="silenceWarning">
      ⚠ No audio detected — this site may use DRM protection.
    </div>

    <div class="warming-up hidden" id="warmingUp">
      <div class="spinner"></div>
      <span>Warming up GPU...</span>
    </div>

    <div class="captions" id="captions">
      <div class="empty-state" id="emptyState">
        Captions will appear here when translation starts.
      </div>
    </div>
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
